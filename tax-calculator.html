<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人所得税计算器</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap');

:root {
  --bg: #f5f2ec;
  --surface: #ffffff;
  --surface2: #f0ece3;
  --border: #d8d2c4;
  --text: #1a1814;
  --muted: #7a7060;
  --accent: #c0392b;
  --accent2: #185fa5;
  --accent3: #1a7a4a;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Noto Sans SC', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  line-height: 1.6;
  min-height: 100vh;
}

.layout {
  display: grid;
  grid-template-columns: 300px 1fr;
  min-height: 100vh;
}

/* LEFT PANEL */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 24px 20px;
  overflow-y: auto;
  position: sticky;
  top: 0;
  max-height: 100vh;
}

.app-title {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 20px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}

.section-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
  margin: 18px 0 10px;
}

.field { margin-bottom: 10px; }
.field label {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 4px;
}
.field label span {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--border);
}

input[type=number], select {
  width: 100%;
  padding: 7px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
input[type=number]:focus, select:focus { border-color: var(--accent2); }

.cap-display {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent2);
  margin-top: 3px;
  padding: 4px 8px;
  background: #e8f1fb;
  border-radius: 3px;
  display: none;
}

.hint-box {
  background: var(--surface2);
  border-left: 2px solid var(--border);
  padding: 8px 10px;
  margin-top: 14px;
  border-radius: 0 4px 4px 0;
}
.hint-box p { font-size: 11px; color: var(--muted); line-height: 1.7; }
.hint-box strong { color: var(--text); font-weight: 500; }

/* RIGHT PANEL */
.main {
  padding: 24px 28px;
  overflow-x: auto;
}

.summary-bar {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-bottom: 24px;
}

.kpi {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 14px;
}
.kpi-label {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 5px;
  font-family: var(--mono);
}
.kpi-value {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 500;
  letter-spacing: -0.02em;
}
.kpi-value.red { color: var(--accent); }
.kpi-value.blue { color: var(--accent2); }
.kpi-value.green { color: var(--accent3); }
.kpi-sub {
  font-size: 10px;
  color: var(--muted);
  margin-top: 2px;
  font-family: var(--mono);
}

/* BONUS CARD */
.bonus-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px 18px;
  margin-bottom: 20px;
  display: grid;
  grid-template-columns: auto 1fr repeat(3, auto);
  gap: 0 24px;
  align-items: center;
}
.bonus-badge {
  font-family: var(--mono);
  font-size: 10px;
  background: #e8f1fb;
  color: var(--accent2);
  border: 1px solid #b5d4f4;
  border-radius: 3px;
  padding: 3px 8px;
  letter-spacing: 0.06em;
  white-space: nowrap;
}
.bonus-desc { font-size: 12px; color: var(--muted); }
.bonus-stat { text-align: right; }
.bonus-stat-label { font-size: 10px; color: var(--muted); font-family: var(--mono); }
.bonus-stat-val { font-family: var(--mono); font-size: 14px; font-weight: 500; }
.bonus-stat-val.red { color: var(--accent); }
.bonus-stat-val.green { color: var(--accent3); }

/* TABLE */
.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}

table { width: 100%; border-collapse: collapse; }

thead tr {
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
}

th {
  padding: 9px 12px;
  text-align: right;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.06em;
  color: var(--muted);
  white-space: nowrap;
}
th:first-child { text-align: left; width: 50px; }
th.group-header {
  border-bottom: none;
  padding-bottom: 2px;
  color: var(--text);
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #faf8f4; }
tbody tr.bonus-month { background: #f0f5ff; }
tbody tr.bonus-month:hover { background: #e8f0fc; }
tbody tr.total-row { background: var(--surface2); border-top: 2px solid var(--border); }

td {
  padding: 8px 12px;
  text-align: right;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  white-space: nowrap;
}
td:first-child { text-align: left; font-weight: 500; }

.tax-cell { color: var(--accent); font-weight: 500; }
.net-cell { color: var(--accent3); font-weight: 500; }
.si-cell { color: var(--accent2); }

.bonus-inline {
  display: block;
  font-size: 10px;
  color: var(--accent2);
  margin-top: 1px;
}

/* MINI BAR */
.mini-bar-wrap {
  display: flex;
  align-items: center;
  gap: 3px;
  margin-top: 4px;
}
.mb { height: 3px; border-radius: 1px; }
.mb-si { background: var(--accent2); opacity: 0.7; }
.mb-tax { background: var(--accent); }
.mb-net { background: var(--accent3); opacity: 0.8; }

/* SECTION DIVIDER in table head */
.col-divider { border-left: 1px solid var(--border) !important; }

.footer-note {
  margin-top: 10px;
  font-size: 11px;
  color: var(--muted);
  font-family: var(--mono);
}

@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { position: static; max-height: none; }
  .summary-bar { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div class="layout">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="app-title">个人所得税 · 全年模拟</div>

  <div class="section-label">月度收入</div>
  <div class="field">
    <label>税前月收入（元）</label>
    <input type="number" id="gross" placeholder="" step="100">
  </div>

  <div class="section-label">社保参数</div>
  <div class="field">
    <label>养老保险个人比例 <span>%</span></label>
    <input type="number" id="r-pension" value="8" step="0.5" min="0" max="20">
  </div>
  <div class="field">
    <label>失业保险个人比例 <span>%</span></label>
    <input type="number" id="r-unemp" value="0.5" step="0.1" min="0" max="2">
  </div>
  <div class="field">
    <label>医疗保险个人比例 <span>%</span></label>
    <input type="number" id="r-medical" value="2" step="0.5" min="0" max="5">
  </div>
  <div class="field">
    <label>年金个人比例 <span>%（没有填0）</span></label>
    <input type="number" id="r-annuity" value="1.885" step="0.1" min="0" max="10">
  </div>

  <div class="section-label">公积金</div>
  <div class="field">
    <label>公积金比例 <span>%</span></label>
    <input type="number" id="r-hf" placeholder="" step="1" min="5" max="24">
  </div>
  <div class="field">
    <label>月缴存上限（元）<span>手动输入</span></label>
    <input type="number" id="hf-cap" placeholder="" step="1">
    <div class="cap-display" id="cap-note"></div>
  </div>
  <div class="hint-box">
    <p><strong>公积金缴存常见上限参考（2025-26年度）：</strong><br>
    北京约 4,297元，上海约 4,476元（含补充），深圳约 5,328元，广州约 4,780元。<br>
    以上为2026年4月当前执行的标准（按个人12%比例计算），实际以所在城市最新公告为准，建议自行查询后填入。</p>
  </div>

  <div class="section-label">专项附加扣除（年）</div>
  <div class="field">
    <label>住房租金 <span>元/年</span></label>
    <input type="number" id="d-rent" placeholder="" step="1000">
  </div>
  <div class="field">
    <label>子女教育 <span>元/年（每孩2000/月）</span></label>
    <input type="number" id="d-child" value="0" step="12000">
  </div>
  <div class="field">
    <label>赡养老人 <span>元/年（独生2000/月）</span></label>
    <input type="number" id="d-parent" value="0" step="12000">
  </div>
  <div class="field">
    <label>继续教育 <span>元/年</span></label>
    <input type="number" id="d-edu" value="0" step="4800">
  </div>
  <div class="field">
    <label>其他专项附加 <span>元/年</span></label>
    <input type="number" id="d-other" value="0" step="1000">
  </div>

  <div class="section-label">年终奖</div>
  <div class="field">
    <label>年终奖金额 <span>元（0=不计）</span></label>
    <input type="number" id="bonus" placeholder="" step="1000">
  </div>
  <div class="field">
    <label>发放月份</label>
    <select id="bonus-month">
      <option value="1">1月</option><option value="2">2月</option>
      <option value="3" selected>3月</option><option value="4">4月</option>
      <option value="5">5月</option><option value="6">6月</option>
      <option value="7">7月</option><option value="8">8月</option>
      <option value="9">9月</option><option value="10">10月</option>
      <option value="11">11月</option><option value="12">12月</option>
    </select>
  </div>
</aside>

<!-- MAIN -->
<main class="main">

  <div class="summary-bar" id="summary-bar">
    <div class="kpi"><div class="kpi-label">年度税前</div><div class="kpi-value blue" id="k-gross">-</div></div>
    <div class="kpi"><div class="kpi-label">社保公积金合计</div><div class="kpi-value" id="k-si">-</div></div>
    <div class="kpi"><div class="kpi-label">个税合计</div><div class="kpi-value red" id="k-tax">-</div></div>
    <div class="kpi"><div class="kpi-label">年度到手</div><div class="kpi-value green" id="k-net">-</div></div>
    <div class="kpi"><div class="kpi-label">综合税负</div><div class="kpi-value red" id="k-rate">-</div><div class="kpi-sub" id="k-rate2"></div></div>
  </div>

  <div class="bonus-card" id="bonus-card"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th rowspan="2">月</th>
          <th rowspan="2">应发</th>
          <th colspan="4" class="group-header" style="text-align:center;border-bottom:1px solid var(--border)">扣除项</th>
          <th colspan="3" class="group-header col-divider" style="text-align:center;border-bottom:1px solid var(--border)">累计（年初至本月）</th>
          <th colspan="2" class="group-header col-divider" style="text-align:center;border-bottom:1px solid var(--border)">本月实际</th>
        </tr>
        <tr>
          <th>养老</th>
          <th>医疗</th>
          <th>公积金</th>
          <th>社保小计</th>
          <th class="col-divider">累计应发</th>
          <th>累计应税所得</th>
          <th>累计预扣税</th>
          <th class="col-divider">当月扣税</th>
          <th>实发</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="footer-note" id="footer-note"></div>
</main>
</div>

<script>
const BRACKETS = [
  {max:36000,rate:0.03,deduct:0},
  {max:144000,rate:0.10,deduct:2520},
  {max:300000,rate:0.20,deduct:16920},
  {max:420000,rate:0.25,deduct:31920},
  {max:660000,rate:0.30,deduct:52920},
  {max:960000,rate:0.35,deduct:85920},
  {max:Infinity,rate:0.45,deduct:181920}
];
const BASIC = 60000;

function v(id){ return parseFloat(document.getElementById(id).value)||0; }

function taxFromCum(cum){
  if(cum<=0) return 0;
  for(const b of BRACKETS) if(cum<=b.max) return cum*b.rate-b.deduct;
  return cum*0.45-181920;
}

function bonusCalc(amount){
  if(amount<=0) return {rate:0,deduct:0,tax:0};
  const m=amount/12;
  for(const b of BRACKETS) if(m<=b.max) return {rate:b.rate,deduct:b.deduct,tax:Math.max(0,amount*b.rate-b.deduct)};
  return {rate:0.45,deduct:181920,tax:amount*0.45-181920};
}

function fmt(n,d=0){ return new Intl.NumberFormat('zh-CN',{minimumFractionDigits:d,maximumFractionDigits:d}).format(Math.round(n)); }
function fmtY(n){ return '¥'+fmt(n); }
function pct(n){ return (n*100).toFixed(1)+'%'; }

function calc(){
  const gross = v('gross');
  const rPension = v('r-pension')/100;
  const rUnemp = v('r-unemp')/100;
  const rMedical = v('r-medical')/100;
  const rAnnuity = v('r-annuity')/100;
  const rHF = v('r-hf')/100;
  const hfCap = v('hf-cap');

  // SI per month
  const siPension = gross*rPension;
  const siUnemp = gross*rUnemp;
  const siMedical = gross*rMedical;
  const siAnnuity = gross*rAnnuity;
  const siHF = Math.min(gross*rHF, hfCap);
  const siTotal = siPension+siUnemp+siMedical+siAnnuity+siHF;

  // special deductions annual -> monthly
  const dMonthly = (v('d-rent')+v('d-child')+v('d-parent')+v('d-edu')+v('d-other'))/12;

  const bonusAmt = v('bonus');
  const bonusMonth = parseInt(document.getElementById('bonus-month').value);
  const bc = bonusCalc(bonusAmt);

  // show cap note
  const actualHF = Math.min(gross*rHF, hfCap);
  const capNote = document.getElementById('cap-note');
  if(gross*rHF > hfCap){
    capNote.style.display='block';
    capNote.textContent = `已触及上限：公积金按 ¥${fmt(hfCap)} 计（比例算出 ¥${fmt(gross*rHF)}）`;
  } else {
    capNote.style.display='none';
  }

  // monthly loop
  let cumGross=0, cumSI=0, cumSpecial=0, cumTax=0;
  const rows=[];
  for(let m=1;m<=12;m++){
    cumGross += gross;
    cumSI += siTotal;
    cumSpecial += dMonthly;
    const cumBasic = BASIC;
    const cumTaxable = Math.max(0, cumGross - cumSI - cumSpecial - cumBasic);
    const cumTaxDue = taxFromCum(cumTaxable);
    const monthTax = Math.max(0, cumTaxDue - cumTax);
    cumTax = cumTaxDue;
    const net = gross - siTotal - monthTax;
    rows.push({m, gross, siPension, siUnemp, siMedical, siAnnuity, siHF: actualHF, siTotal,
      cumGross, cumTaxable, cumTaxDue, monthTax, net, isBonus: m===bonusMonth});
  }

  // totals
  const totalGross = gross*12 + bonusAmt;
  const totalSI = siTotal*12;
  const totalTax = cumTax + bc.tax;
  const totalNet = gross*12 - totalSI - cumTax + (bonusAmt - bc.tax);
  const effRate = totalTax / totalGross;

  // KPIs
  document.getElementById('k-gross').textContent = fmtY(totalGross);
  document.getElementById('k-si').textContent = fmtY(totalSI);
  document.getElementById('k-tax').textContent = fmtY(totalTax);
  document.getElementById('k-net').textContent = fmtY(totalNet);
  document.getElementById('k-rate').textContent = pct(effRate);
  document.getElementById('k-rate2').textContent = `月均到手 ${fmtY(totalNet/12)}`;

  // bonus card
  const bcard = document.getElementById('bonus-card');
  if(bonusAmt>0){
    bcard.style.display='grid';
    bcard.innerHTML=`
      <span class="bonus-badge">年终奖单独计税</span>
      <div class="bonus-desc">¥${fmt(bonusAmt)} ÷ 12 = ¥${fmt(bonusAmt/12)}/月 → 适用 ${pct(bc.rate)} 档</div>
      <div class="bonus-stat"><div class="bonus-stat-label">税率 / 速扣</div><div class="bonus-stat-val">${pct(bc.rate)} / ¥${fmt(bc.deduct)}</div></div>
      <div class="bonus-stat"><div class="bonus-stat-label">年终奖税额</div><div class="bonus-stat-val red">¥${fmt(bc.tax)}</div></div>
      <div class="bonus-stat"><div class="bonus-stat-label">实发年终奖</div><div class="bonus-stat-val green">¥${fmt(bonusAmt-bc.tax)}</div></div>
    `;
  } else {
    bcard.style.display='none';
  }

  // table
  const tbody = document.getElementById('tbody');
  tbody.innerHTML='';
  const maxGross = gross + (bonusAmt/12);
  rows.forEach(r=>{
    const tr = document.createElement('tr');
    if(r.isBonus && bonusAmt>0) tr.className='bonus-month';
    const barScale = (gross + (bonusAmt>0?bonusAmt/12:0))*1.05;
    const siW = (r.siTotal/barScale*80).toFixed(1);
    const taxW = (r.monthTax/barScale*80).toFixed(1);
    const netW = (r.net/barScale*80).toFixed(1);
    const bonusRow = r.isBonus && bonusAmt>0;
    tr.innerHTML=`
      <td>${r.m}月</td>
      <td>${fmtY(r.gross)}${bonusRow?`<span class="bonus-inline">+${fmtY(bonusAmt)} 年终</span>`:''}
      </td>
      <td class="si-cell">${fmtY(r.siPension)}</td>
      <td class="si-cell">${fmtY(r.siMedical)}</td>
      <td class="si-cell">${fmtY(r.siHF)}</td>
      <td class="si-cell">${fmtY(r.siTotal)}</td>
      <td class="col-divider">${fmtY(r.cumGross)}</td>
      <td>${fmtY(r.cumTaxable)}</td>
      <td>${fmtY(r.cumTaxDue)}</td>
      <td class="tax-cell col-divider">${fmtY(r.monthTax)}${bonusRow?`<span class="bonus-inline">+${fmtY(bc.tax)} 年终</span>`:''}</td>
      <td class="net-cell">${fmtY(r.net)}${bonusRow?`<span class="bonus-inline">+${fmtY(bonusAmt-bc.tax)} 年终</span>`:''}</td>
    `;
    tbody.appendChild(tr);
  });

  // total row
  const tot = document.createElement('tr');
  tot.className='total-row';
  tot.innerHTML=`
    <td>全年</td>
    <td>${fmtY(totalGross)}</td>
    <td>${fmtY(siPension*12)}</td>
    <td>${fmtY(siMedical*12)}</td>
    <td>${fmtY(actualHF*12)}</td>
    <td class="si-cell">${fmtY(totalSI)}</td>
    <td class="col-divider">—</td>
    <td>—</td>
    <td>—</td>
    <td class="tax-cell col-divider">${fmtY(totalTax)}</td>
    <td class="net-cell">${fmtY(totalNet)}</td>
  `;
  tbody.appendChild(tot);

  // footer
  document.getElementById('footer-note').textContent =
    `基数：起征点 ¥5,000/月 · 社保各项均按实发工资计算 · 年终奖适用全年一次性奖金单独计税政策（2027年底前有效）`;
}

document.querySelectorAll('input,select').forEach(el=>el.addEventListener('input',calc));
calc();
</script>
</body>
</html>
